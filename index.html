<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#000000">
  <!-- style-src 'unsafe-inline' is load-bearing: Painter.paint sets cell.style.backgroundColor every frame.
       frame-ancestors is omitted; meta-tag form isn't honored by browsers, so it's a deployment-header concern. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none';">
  <title>goldeneye</title>
  <meta name="description" content="First-person-shoot for the stars! fisheye renderer in JavaScript: SDFs sphere-traced under lambertian shading, painted onto a CSS grid of div circles. Aquarium demonstration of a re-usable core graphics engine.">
  <meta property="og:title" content="goldeneye">
  <meta property="og:description" content="First-person-shoot for the stars! fisheye renderer in JavaScript: SDFs sphere-traced under lambertian shading, painted onto a CSS grid of div circles. Aquarium demonstration of a re-usable core graphics engine.">
  <meta property="og:type" content="website">
  <!-- vv -->
  <meta property="og:url" content="https://tjohncan.github.io/goldeneye/">
  <meta property="og:image" content="https://tjohncan.github.io/goldeneye/og-image.png">
  <!-- ^^ -->
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <link rel="icon" href="favicon.ico" sizes="48x48">
  <link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
  <link rel="icon" type="image/png" sizes="64x64" href="favicon/favicon-64x64.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" href="favicon/apple-touch-icon.png">
  <link rel="manifest" href="favicon/site.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="main.js"></script>
</head>
<body>
  <div id="screen-wrap">
    <div id="screen"></div>
  </div>
</body>
</html>
